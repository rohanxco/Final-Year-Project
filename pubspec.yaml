name: azaan
description: "Azaan - Prayer Times, Qibla, and Quran utility app (Flutter)."
publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=3.10.7 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Prayer times + formatting
  adhan: ^2.0.0
  intl: ^0.19.0

  # Location
  geolocator: ^13.0.4

  # Local storage
  shared_preferences: ^2.5.4

  # Compass (mobile only)
  flutter_compass: ^0.8.1

  # External links
  url_launcher: ^6.3.2

  # HTTP
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/quran/quran.json
    - assets/fonts/

  fonts:
  - family: Amiri
    fonts:
      - asset: assets/fonts/Amiri-Regular.ttf
      - asset: assets/fonts/Amiri-Bold.ttf
        weight: 700

  - family: AmiriQuran
    fonts:
      - asset: assets/fonts/AmiriQuran-Regular.ttf

  - family: UthmanicHafs
    fonts:
      - asset: assets/fonts/UthmanicHafs.otf